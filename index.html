<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Tarot</title>
  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f0f11;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    header h1 {
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    header p {
      color: #8a8a93;
      font-size: 0.95rem;
    }

    /* Options Sections */
    .options-section {
      width: 100%;
    }

    .options-section h3 {
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      color: #8a8a93;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .options-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    /* Option Buttons */
    .option-btn {
      background: #1a1a1e;
      color: #ffffff;
      border: 1px solid #33333a;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .option-btn:hover {
      border-color: #666675;
    }

    .option-btn.selected {
      background: #ffffff;
      color: #0f0f11;
      border-color: #ffffff;
      font-weight: bold;
    }

    /* Visibility Control */
    .hidden {
      display: none !important;
    }

    /* Charge / Hold Button Area */
    #charge-wrapper {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .progress-ring-container {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .progress-ring {
      position: absolute;
      top: 0;
      left: 0;
      transform: rotate(-90deg);
    }

    .progress-ring-circle {
      transition: stroke-dashoffset 0.05s linear;
    }

    #charge-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #1a1a1e;
      border: 1px solid #33333a;
      color: #ffffff;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      user-select: none;
      z-index: 2;
      transition: transform 0.1s ease;
    }

    #charge-btn:active {
      transform: scale(0.95);
    }

    /* Reading Results Grid */
    #reading-section {
      width: 100%;
      margin-top: 10px;
    }

    #reading-section h2 {
      margin-bottom: 8px;
      font-size: 1.2rem;
      letter-spacing: 1px;
    }

    .reading-explanation {
      color: #a0a0ab;
      font-size: 0.9rem;
      margin-bottom: 25px;
      font-style: italic;
    }

    .cards-container {
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 20px;
      width: 100%;
    }

    .card {
      flex: 1;
      max-width: 220px;
      background: #1a1a1e;
      border: 1px solid #2a2a30;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    /* Standard Card Back Styling */
    .card-back-design {
      width: 100%;
      height: 260px;
      background: linear-gradient(135deg, #1f1f26 0%, #111115 100%);
      border: 2px solid #3a3a45;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-bottom: 12px;
      box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
    }

    .card-back-design span {
      font-size: 0.8rem;
      letter-spacing: 2px;
      color: #8a8a93;
      text-transform: uppercase;
    }

    .card img {
      width: 100%;
      max-width: 180px;
      height: auto;
      border-radius: 4px;
      margin-bottom: 12px;
      transition: transform 0.3s ease;
    }

    .card img.reversed {
      transform: rotate(180deg);
    }

    .card-title {
      font-size: 0.95rem;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .card-desc {
      font-size: 0.8rem;
      color: #a0a0ab;
      line-height: 1.4;
    }

    @media (max-width: 600px) {
      .cards-container {
        flex-direction: column;
        align-items: center;
      }
      .card {
        max-width: 280px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>TAROT READER</h1>
      <p>Calibrate your focus and intention.</p>
    </header>

    <!-- 1. FOCUS AREA -->
    <section class="options-section">
      <h3>1. FOCUS AREA</h3>
      <div class="options-grid">
        <button class="option-btn" data-group="focus">Career</button>
        <button class="option-btn" data-group="focus">Relationships</button>
        <button class="option-btn" data-group="focus">Personal Growth</button>
        <button class="option-btn" data-group="focus">Energy & Drive</button>
      </div>
    </section>

    <!-- 2. INTENTION STANCE -->
    <section class="options-section">
      <h3>2. INTENTION STANCE</h3>
      <div class="options-grid">
        <button class="option-btn" data-group="intention">Overcoming a Block</button>
        <button class="option-btn" data-group="intention">Seeking Clarity</button>
        <button class="option-btn" data-group="intention">Next Move</button>
      </div>
    </section>

    <!-- HOLD / CHARGE BUTTON -->
    <div id="charge-wrapper" class="hidden">
      <div class="progress-ring-container">
        <svg class="progress-ring" width="120" height="120">
          <circle class="progress-ring-circle" stroke="white" stroke-width="4" fill="transparent" r="52" cx="60" cy="60"/>
        </svg>
        <button id="charge-btn">HOLD</button>
      </div>
    </div>

    <!-- READING RESULTS -->
    <section id="reading-section" class="hidden">
      <h2 id="reading-title">Your Tarot Selection</h2>
      <p id="reading-explanation" class="reading-explanation">Select one card below to receive your guidance for this reading.</p>
      
      <div class="cards-container">
        <div class="card" id="card-0">
          <div class="card-back-design">
            <span>🎴 Click to Choose</span>
          </div>
          <h4 class="card-title">Card I</h4>
          <p class="card-desc"></p>
        </div>
        <div class="card" id="card-1">
          <div class="card-back-design">
            <span>🎴 Click to Choose</span>
          </div>
          <h4 class="card-title">Card II</h4>
          <p class="card-desc"></p>
        </div>
        <div class="card" id="card-2">
          <div class="card-back-design">
            <span>🎴 Click to Choose</span>
          </div>
          <h4 class="card-title">Card III</h4>
          <p class="card-desc"></p>
        </div>
      </div>
    </section>
  </div>

  <script>
    const deck = [
      { name: "The Fool", image: "https://upload.wikimedia.org/wikipedia/commons/5/54/RWS_Tarot_00_Fool.jpg", desc: "New beginnings, optimism, trust in the universe." },
      { name: "The Magician", image: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg", desc: "Manifestation, resourcefulness, power, inspired action." },
      { name: "The High Priestess", image: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg", desc: "Intuition, sacred knowledge, divine feminine, subconscious." },
      { name: "The Empress", image: "https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg", desc: "Femininity, beauty, nature, nurturing, abundance." },
      { name: "The Emperor", image: "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg", desc: "Authority, structure, control, father figure, foundation." },
      { name: "The Hierophant", image: "https://upload.wikimedia.org/wikipedia/commons/8/8d/RWS_Tarot_05_Hierophant.jpg", desc: "Spiritual wisdom, religious beliefs, conformity, tradition." },
      { name: "The Lovers", image: "https://upload.wikimedia.org/wikipedia/commons/3/3a/TheLovers.jpg", desc: "Love, harmony, relationships, values alignment, choices." },
      { name: "The Chariot", image: "https://upload.wikimedia.org/wikipedia/commons/9/9b/RWS_Tarot_07_Chariot.jpg", desc: "Control, willpower, success, action, determination." },
      { name: "Strength", image: "https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg", desc: "Strength, courage, persuasion, influence, compassion." },
      { name: "The Hermit", image: "https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg", desc: "Soul-searching, introspection, being alone, inner guidance." },
      { name: "Wheel of Fortune", image: "https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg", desc: "Good luck, karma, life cycles, destiny, a turning point." },
      { name: "Justice", image: "https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg", desc: "Justice, fairness, truth, cause and effect, law." },
      { name: "The Hanged Man", image: "https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg", desc: "Pause, surrender, letting go, new perspectives." },
      { name: "Death", image: "https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg", desc: "Endings, change, transformation, transition." },
      { name: "Temperance", image: "https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg", desc: "Balance, moderation, patience, purpose." },
      { name: "The Devil", image: "https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg", desc: "Shadow self, attachment, addiction, restriction, sexuality." },
      { name: "The Tower", image: "https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg", desc: "Sudden change, upheaval, chaos, revelation, awakening." },
      { name: "The Star", image: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg", desc: "Hope, faith, purpose, renewal, spirituality." },
      { name: "The Moon", image: "https://upload.wikimedia.org/wikipedia/commons/7/7f/RWS_Tarot_18_Moon.jpg", desc: "Illusion, fear, anxiety, subconscious, intuition." },
      { name: "The Sun", image: "https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg", desc: "Positivity, fun, warmth, success, vitality." },
      { name: "Judgement", image: "https://upload.wikimedia.org/wikipedia/commons/d/dd/RWS_Tarot_20_Judgement.jpg", desc: "Judgement, rebirth, inner calling, absolution." },
      { name: "The World", image: "https://upload.wikimedia.org/wikipedia/commons/ff/ff/RWS_Tarot_21_World.jpg", desc: "Completion, integration, accomplishment, travel." }
    ];

    const state = { focus: null, intention: null, drawnCards: [] };

    const optionBtns = document.querySelectorAll('.option-btn');
    const chargeWrapper = document.getElementById('charge-wrapper');
    const chargeBtn = document.getElementById('charge-btn');
    const circle = document.querySelector('.progress-ring-circle');
    const readingSection = document.getElementById('reading-section');
    const readingTitle = document.getElementById('reading-title');
    const readingExplanation = document.getElementById('reading-explanation');

    const radius = circle.r.baseVal.value;
    const circumference = 2 * Math.PI * radius;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = circumference;

    function setProgress(percent) {
      const offset = circumference - (percent / 100) * circumference;
      circle.style.strokeDashoffset = offset;
    }

    optionBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const group = btn.dataset.group;
        document.querySelectorAll(`.option-btn[data-group="${group}"]`).forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        state[group] = btn.textContent.trim();

        if (state.focus && state.intention) {
          chargeWrapper.classList.remove('hidden');
        }
      });
    });

    let holdTimer = null;
    let progress = 0;
    const HOLD_DURATION = 1500;
    const INTERVAL = 30;

    function startHold(e) {
      e.preventDefault();
      progress = 0;
      setProgress(0);
      holdTimer = setInterval(() => {
        progress += (INTERVAL / HOLD_DURATION) * 100;
        setProgress(progress);
        if (progress >= 100) {
          clearInterval(holdTimer);
          completeCharge();
        }
      }, INTERVAL);
    }

    function cancelHold() {
      if (holdTimer) {
        clearInterval(holdTimer);
        holdTimer = null;
        progress = 0;
        setProgress(0);
      }
    }

    function completeCharge() {
      chargeWrapper.classList.add('hidden');
      drawCards();
      readingSection.classList.remove('hidden');
    }

    chargeBtn.addEventListener('mousedown', startHold);
    chargeBtn.addEventListener('mouseup', cancelHold);
    chargeBtn.addEventListener('mouseleave', cancelHold);
    chargeBtn.addEventListener('touchstart', startHold);
    chargeBtn.addEventListener('touchend', cancelHold);

    function drawCards() {
      const shuffled = [...deck].sort(() => 0.5 - Math.random());
      state.drawnCards = shuffled.slice(0, 3).map(card => ({
        ...card,
        isReversed: Math.random() < 0.3
      }));

      // Reset section headers
      readingTitle.textContent = "Your Tarot Selection";
      readingExplanation.textContent = `Focused on ${state.focus} with intention of ${state.intention}. Pick one card below to reveal your path.`;

      [0, 1, 2].forEach(idx => {
        const cardEl = document.getElementById(`card-${idx}`);
        cardEl.classList.remove('hidden');
        cardEl.innerHTML = `
          <div class="card-back-design">
            <span>🎴 Click to Choose</span>
          </div>
          <h4 class="card-title">Card ${idx + 1}</h4>
          <p class="card-desc"></p>
        `;

        cardEl.addEventListener('click', () => {
          selectSingleCard(idx);
        });
      });
    }

    function selectSingleCard(selectedIdx) {
      const selectedData = state.drawnCards[selectedIdx];

      // Hide all unselected cards
      [0, 1, 2].forEach(idx => {
        const cardEl = document.getElementById(`card-${idx}`);
        if (idx !== selectedIdx) {
          cardEl.classList.add('hidden');
        } else {
          // Reveal the picked card
          cardEl.innerHTML = `
            <img class="card-img ${selectedData.isReversed ? 'reversed' : ''}" src="${selectedData.image}" alt="${selectedData.name}">
            <h4 class="card-title">${selectedData.name} ${selectedData.isReversed ? '(Reversed)' : ''}</h4>
            <p class="card-desc">${selectedData.desc}</p>
          `;
        }
      });

      readingTitle.textContent = "Your Chosen Guidance";
      readingExplanation.textContent = `Here is your drawn message for ${state.focus} (${state.intention}).`;
    }
  </script>
</body>
</html>
