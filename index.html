<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarot Card Reader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <h1>Tarot Card Reader</h1>
    <p class="subtitle">Calibrate your focus and intention before charging the deck.</p>

    <!-- Dial 1: Focus Area -->
    <div id="dial-focus" class="dial-group">
      <label class="dial-label">1. Focus Area</label>
      <div class="options-grid">
        <button class="option-btn" data-type="focus" data-value="Career">💼 Career</button>
        <button class="option-btn" data-type="focus" data-value="Relationships">🤍 Relationships</button>
        <button class="option-btn" data-type="focus" data-value="Personal Growth">🌿 Personal Growth</button>
        <button class="option-btn" data-type="focus" data-value="Energy & Drive">⚡ Energy & Drive</button>
      </div>
    </div>

    <!-- Dial 2: Intention Stance -->
    <div id="dial-intention" class="dial-group">
      <label class="dial-label">2. Intention Stance</label>
      <div class="options-grid">
        <button class="option-btn" data-type="intention" data-value="Overcoming a Block">🧱 Overcoming a Block</button>
        <button class="option-btn" data-type="intention" data-value="Seeking Clarity">🔍 Seeking Clarity</button>
        <button class="option-btn" data-type="intention" data-value="Next Move">🚀 Next Move</button>
      </div>
    </div>

    <!-- Charge Button Container -->
    <div class="charge-wrapper">
      <!-- Portal Spark Ring Container -->
      <div id="spark-ring" class="spark-ring"></div>
      
      <button id="charge-btn" class="disabled-btn" disabled>
        <div id="charge-fill" class="charge-fill"></div>
        <span id="charge-text" class="charge-text">Hold to Charge Deck</span>
      </button>
    </div>

    <!-- Dynamic Breathing / Status Instruction Text Below Button -->
    <p id="instruction" class="instruction-text">
      Select a Focus Area and Intention Stance to begin.
    </p>

    <!-- Container for the 3 face-down cards -->
    <div id="cards-container" class="hidden">
      <div class="card-back"></div>
      <div class="card-back"></div>
      <div class="card-back"></div>
    </div>
    
   <!-- Display area for the final drawn card with Spotlight/Zoom feature -->
<div id="card-display" class="hidden cosmic-spotlight-group">
  <div class="reading-header-meta">
    <!-- Meta and Title go here -->
  </div>
  
  <div class="interactive-tarot-focus-wrapper">
    <!-- Main Card Image -->
    <img id="main-tarot-img" src="" alt="" class="tarot-img" />

    <!-- COSMIC SPOTLIGHT ELEMENTS HERE 🎆 -->
    <div id="cosmic-lens" class="cosmic-lens hidden"></div>
    <div id="symbol-hint-dots" class="symbol-hint-dots hidden"></div>
  </div>

  <div class="reading-text-output">
    <!-- Vibe and Example text -->
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
