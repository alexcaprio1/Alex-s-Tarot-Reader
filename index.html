<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Tarot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>SCIENTIFIC TAROT</h1>
      <p class="subtitle">A Minimalist Archetype Reader</p>
    </header>

    <main>
      <div class="control-panel">
        <button id="draw-btn" class="charge-button">
          <span class="btn-icon">✦</span>
          <span class="btn-text">Initialize Reading</span>
        </button>
        <p id="status-text" class="status-text">Click to begin reading</p>
      </div>

      <div id="cards-container" class="cards-grid">
        <!-- Card 1 -->
        <div class="card-slot" id="card-0">
          <div class="card-inner">
            <div class="card-front">
              <span class="card-symbol">✦</span>
            </div>
            <div class="card-back">
              <div class="card-title">---</div>
              <div class="card-orientation">---</div>
            </div>
          </div>
        </div>
        <!-- Card 2 -->
        <div class="card-slot" id="card-1">
          <div class="card-inner">
            <div class="card-front">
              <span class="card-symbol">✦</span>
            </div>
            <div class="card-back">
              <div class="card-title">---</div>
              <div class="card-orientation">---</div>
            </div>
          </div>
        </div>
        <!-- Card 3 -->
        <div class="card-slot" id="card-2">
          <div class="card-inner">
            <div class="card-front">
              <span class="card-symbol">✦</span>
            </div>
            <div class="card-back">
              <div class="card-title">---</div>
              <div class="card-orientation">---</div>
            </div>
          </div>
        </div>
      </div>

      <div id="reading-output" class="reading-output hidden">
        <h2 id="reading-title">Synthesis</h2>
        <p id="reading-text"></p>
      </div>
    </main>

    <footer>
      <p>Scientific Tarot &copy; 2026</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
